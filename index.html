<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的食譜總匯 · IG 珍藏</title>
<style>
  :root{
    --bg:#fbf6ef; --card:#ffffff; --ink:#2b2320; --sub:#8a7d72;
    --accent:#e8622c; --accent-soft:#fceee6; --line:#efe6db;
    --shadow:0 6px 24px rgba(80,50,30,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"PingFang HK","Noto Sans HK","Microsoft JhengHei",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}

  header{padding:38px 20px 22px;text-align:center;background:
    radial-gradient(120% 90% at 50% 0%, #fff3ea 0%, var(--bg) 70%)}
  header .emoji{font-size:40px}
  header h1{font-size:30px;font-weight:800;letter-spacing:.5px;margin-top:4px}
  header p{color:var(--sub);margin-top:6px;font-size:15px}

  .wrap{max-width:1080px;margin:0 auto;padding:0 18px 60px}

  .controls{position:sticky;top:0;z-index:20;padding:14px 0 10px;background:
    linear-gradient(var(--bg) 78%, rgba(251,246,239,0));backdrop-filter:blur(2px)}
  .search{width:100%;padding:13px 16px;border:1.5px solid var(--line);border-radius:14px;
    font-size:15px;background:#fff;outline:none;transition:.2s}
  .search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .chip{padding:7px 15px;border-radius:999px;border:1.5px solid var(--line);
    background:#fff;color:var(--sub);font-size:13.5px;cursor:pointer;transition:.15s;font-weight:600}
  .chip:hover{border-color:var(--accent)}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .count{color:var(--sub);font-size:13px;margin:14px 2px 4px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px;margin-top:6px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;
    box-shadow:var(--shadow);cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(80,50,30,.14)}
  .thumb{aspect-ratio:1/1;width:100%;object-fit:cover;background:#f1e7dc;display:block}
  .thumb.ph{display:flex;align-items:center;justify-content:center;font-size:52px;
    background:linear-gradient(135deg,#fcdcc7,#f7ede0)}
  .card .body{padding:14px 15px 16px}
  .cat{display:inline-block;font-size:11.5px;font-weight:700;color:var(--accent);
    background:var(--accent-soft);padding:3px 9px;border-radius:999px;margin-bottom:7px}
  .card h3{font-size:16.5px;font-weight:800;line-height:1.35}
  .card .desc{color:var(--sub);font-size:13px;margin-top:6px;display:-webkit-box;
    -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .meta{margin-top:10px;font-size:12px;color:var(--sub);display:flex;align-items:center;gap:5px}
  .tagrow{margin-top:9px;display:flex;flex-wrap:wrap;gap:5px}
  .tag{font-size:11px;color:var(--sub);background:#f6efe6;padding:2px 8px;border-radius:6px}

  .empty{text-align:center;color:var(--sub);padding:60px 0}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(43,35,32,.55);z-index:100;display:none;
    align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto}
  .overlay.on{display:flex}
  .modal{background:#fff;max-width:560px;width:100%;border-radius:20px;overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.3);animation:pop .2s ease}
  @keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
  .modal .top{position:relative}
  .modal .top img{width:100%;aspect-ratio:1/1;object-fit:cover;background:#f1e7dc}
  .modal .top .ph{width:100%;aspect-ratio:16/10;display:flex;align-items:center;justify-content:center;
    font-size:70px;background:linear-gradient(135deg,#fcdcc7,#f7ede0)}
  .close{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;
    background:rgba(0,0,0,.5);color:#fff;border:none;font-size:20px;cursor:pointer;line-height:1}
  .mbody{padding:20px 22px 26px}
  .mbody .cat{margin-bottom:8px}
  .mbody h2{font-size:23px;font-weight:800}
  .mbody .author{color:var(--sub);font-size:13.5px;margin-top:4px}
  .mbody .sec-t{font-weight:800;font-size:15px;margin:20px 0 8px;display:flex;align-items:center;gap:6px}
  .mbody ul{padding-left:2px;list-style:none}
  .mbody ul li{padding:6px 0 6px 24px;position:relative;font-size:14.5px;border-bottom:1px dashed var(--line)}
  .ing li:before{content:"•";position:absolute;left:6px;color:var(--accent);font-weight:800}
  .step{counter-reset:s}
  .step li{counter-increment:s}
  .step li:before{content:counter(s);position:absolute;left:0;top:6px;width:19px;height:19px;
    background:var(--accent);color:#fff;border-radius:50%;font-size:11px;font-weight:700;
    display:flex;align-items:center;justify-content:center}
  .note{background:var(--accent-soft);border-radius:12px;padding:12px 14px;font-size:13.5px;
    color:#a15a34;margin-top:16px}
  .btn{display:block;text-align:center;margin-top:20px;padding:13px;border-radius:12px;
    background:var(--accent);color:#fff;font-weight:700;font-size:15px}
  .btn:hover{background:#d5551f}
  footer{text-align:center;color:var(--sub);font-size:12.5px;padding:10px 20px 40px}
</style>
</head>
<body>
<header>
  <div class="emoji">🍳</div>
  <h1>我的食譜總匯</h1>
  <p>由 Instagram 珍藏自動整理 · 一撳睇材料同做法</p>
</header>

<div class="wrap">
  <div class="controls">
    <input id="q" class="search" placeholder="🔍 搵食譜、材料或作者…（例如：湯、雞、蛋）">
    <div id="filters" class="filters"></div>
  </div>
  <div id="count" class="count"></div>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" style="display:none">搵唔到相關食譜 🥲 試下轉個關鍵字</div>
</div>

<div id="overlay" class="overlay">
  <div class="modal" id="modal"></div>
</div>

<footer>Demo · 資料由 IG caption 自動整理，片入面講嘅內容未必全部收錄 · 撳「睇原片」睇足本</footer>

<script>
let DATA=[], curCat="全部", curQ="";
const catIcon={"食譜":"🍳","餐廳":"🍜","好去處":"📍","其他":"✨"};

fetch("recipes.json").then(r=>r.json()).then(d=>{
  DATA=d.filter(x=>x.loaded); // 只顯示成功攞到內容嘅
  buildFilters(); render();
});

function buildFilters(){
  const cats=["全部",...new Set(DATA.map(d=>d.category))];
  const f=document.getElementById("filters");
  f.innerHTML=cats.map(c=>`<div class="chip ${c==="全部"?"on":""}" data-c="${c}">${c==="全部"?"全部":(catIcon[c]||"")+" "+c}</div>`).join("");
  f.querySelectorAll(".chip").forEach(ch=>ch.onclick=()=>{
    f.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
    ch.classList.add("on"); curCat=ch.dataset.c; render();
  });
}

document.getElementById("q").addEventListener("input",e=>{curQ=e.target.value.trim().toLowerCase();render();});

function match(d){
  if(curCat!=="全部" && d.category!==curCat) return false;
  if(!curQ) return true;
  const hay=(d.dish+" "+d.summary+" "+d.author+" "+d.author_name+" "+d.ingredients.join(" ")+" "+d.tags.join(" ")+" "+d.caption).toLowerCase();
  return hay.includes(curQ);
}

function render(){
  const list=DATA.filter(match);
  const g=document.getElementById("grid");
  document.getElementById("count").textContent=`共 ${list.length} 個`;
  document.getElementById("empty").style.display=list.length?"none":"block";
  g.innerHTML=list.map((d,i)=>{
    const idx=DATA.indexOf(d);
    const src=d.local_thumb||d.thumb||'';
    const thumb=src
      ? `<img class="thumb" loading="lazy" referrerpolicy="no-referrer" src="${src}" onerror="this.outerHTML='<div class=\\'thumb ph\\'>${catIcon[d.category]||'🍽️'}</div>'">`
      : `<div class="thumb ph">${catIcon[d.category]||'🍽️'}</div>`;
    return `<div class="card" onclick="openM(${idx})">
      ${thumb}
      <div class="body">
        <span class="cat">${catIcon[d.category]||''} ${d.category}</span>
        <h3>${esc(d.dish||'未命名食譜')}</h3>
        <div class="desc">${esc(d.summary||'')}</div>
        <div class="tagrow">${d.tags.slice(0,3).map(t=>`<span class="tag">#${esc(t)}</span>`).join("")}</div>
        <div class="meta">👤 ${esc(d.author_name||d.author||'')}</div>
      </div>
    </div>`;
  }).join("");
}

function openM(i){
  const d=DATA[i];
  const tsrc=d.local_thumb||d.thumb||'';
  const top=tsrc
    ? `<img referrerpolicy="no-referrer" src="${tsrc}" onerror="this.outerHTML='<div class=\\'ph\\'>${catIcon[d.category]||'🍽️'}</div>'">`
    : `<div class="ph">${catIcon[d.category]||'🍽️'}</div>`;
  const ing=d.ingredients.length
    ? `<div class="sec-t">🧺 材料</div><ul class="ing">${d.ingredients.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`:"";
  const step=d.steps.length
    ? `<div class="sec-t">👩‍🍳 做法</div><ul class="step">${d.steps.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`:"";
  const noInfo=(!d.ingredients.length && !d.steps.length)
    ? `<div class="note">📹 呢條片嘅材料同做法冇寫喺 caption（作者靠片講）。撳下面睇原片就有齊。</div>`:"";
  document.getElementById("modal").innerHTML=`
    <div class="top">${top}<button class="close" onclick="closeM()">×</button></div>
    <div class="mbody">
      <span class="cat">${catIcon[d.category]||''} ${d.category}</span>
      <h2>${esc(d.dish||'未命名食譜')}</h2>
      <div class="author">👤 ${esc(d.author_name||d.author||'')} ${d.author?`· @${esc(d.author)}`:''}</div>
      <p style="margin-top:12px;font-size:14.5px;color:#5a4f47">${esc(d.summary||'')}</p>
      ${ing}${step}${noInfo}
      <div class="tagrow" style="margin-top:16px">${d.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join("")}</div>
      <a class="btn" href="${d.url}" target="_blank">▶ 睇 Instagram 原片</a>
    </div>`;
  document.getElementById("overlay").classList.add("on");
  document.body.style.overflow="hidden";
}
function closeM(){document.getElementById("overlay").classList.remove("on");document.body.style.overflow="";}
document.getElementById("overlay").addEventListener("click",e=>{if(e.target.id==="overlay")closeM();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeM();});

function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
</script>
</body>
</html>
